<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Processing Workshop</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    gap:40px;
}

.controls{
    width:250px;
}

canvas{
    border:2px solid white;
}

button{
    margin:4px;
    padding:6px 10px;
}
</style>
</head>

<body>

<div class="container">

<canvas id="canvas" width="400" height="300"></canvas>

<div class="controls">

<h3>Post Processing</h3>

<label>Brightness</label>
<input type="range" id="brightness" min="0" max="2" step="0.01" value="1">

<br><br>

<label>Contrast</label>
<input type="range" id="contrast" min="0" max="2" step="0.01" value="1">

<br><br>

<label>Saturation</label>
<input type="range" id="saturation" min="0" max="2" step="0.01" value="1">

<br><br>

<label>
<input type="checkbox" id="vignette">
Vignette
</label>

<br><br>

<input type="file" id="ImageInput" accept="image/*">

</div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const imageLoader = document.getElementById("ImageInput")
const brightness = document.getElementById("brightness")
const contrast = document.getElementById("contrast")
const saturation = document.getElementById("saturation")
const vignette = document.getElementById("vignette")

const img = new Image()
//img.src = "https://picsum.photos/400/300"
imageLoader.addEventListener("change", handleImage, false)


img.onload = draw

brightness.oninput = draw
contrast.oninput = draw
saturation.oninput = draw
vignette.onchange = draw

function handleImage(e) {
    const reader = new FileReader();

    reader.onload = function(event) {
        img.onload = draw
        img.src = event.target.result;
    }
    
    if (e.target.files && e.target.files[0]) {
        reader.readAsDataURL(e.target.files[0]);
    }
    draw()
}


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(img,0,0,canvas.width,canvas.height)

let imageData = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = imageData.data

for(let i = 0; i < data.length; i += 4){

    let r = data[i]
    let g = data[i+1]
    let b = data[i+2]

    // TODO: Brightness

    // TODO: Contrast

    // TODO: Saturation

    data[i] = r
    data[i+1] = g
    data[i+2] = b
}

ctx.putImageData(imageData,0,0)
}

// `

// 200,150,50,
// 200,150,200
// )

// gradient.addColorStop(0,"rgba(0,0,0,0)")
// gradient.addColorStop(1,"rgba(0,0,0,0.6)")

// ctx.fillStyle = gradient
// ctx.fillRect(0,0,400,300)

// }


draw()

</script>

</body>
</html>
