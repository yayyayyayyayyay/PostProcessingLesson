<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Processing Workshop</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    gap:40px;
}

.controls{
    width:250px;
}

canvas{
    border:2px solid white;
}

button{
    margin:4px;
    padding:6px 10px;
}
</style>
</head>

<body>

<div class="container">

<canvas id="canvas" width="400" height="300"></canvas>

<div class="controls">

<h3>Post Processing</h3>

<label>Brightness</label>
<input type="range" id="brightness" min="0" max="2" step="0.01" value="1">

<br><br>

<label>Contrast</label>
<input type="range" id="contrast" min="0" max="2" step="0.01" value="1">

<br><br>

<label>Saturation</label>
<input type="range" id="saturation" min="0" max="2" step="0.01" value="1">

<br><br>

<label>Blur</label>
<input type="range" id="blur" min="0" max="5" step="1" value="0">

<br><br>

<label>
<input type="checkbox" id="vignette">
Vignette
</label>

<br><br>

<input type="file" id="ImageInput" accept="image/*">

</div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const imageLoader = document.getElementById("ImageInput")
const brightness = document.getElementById("brightness")
const contrast = document.getElementById("contrast")
const saturation = document.getElementById("saturation")
const blur = document.getElementById("blur")
const vignette = document.getElementById("vignette")

const img = new Image()
//img.src = "https://picsum.photos/400/300"
imageLoader.addEventListener("change", handleImage, false)


img.onload = draw

brightness.oninput = draw
contrast.oninput = draw
saturation.oninput = draw
blur.oninput = draw
vignette.onchange = draw

function handleImage(e) {
    const reader = new FileReader();

    reader.onload = function(event) {
        img.onload = draw
        img.src = event.target.result;
    }
    
    if (e.target.files && e.target.files[0]) {
        reader.readAsDataURL(e.target.files[0]);
    }
    draw()
}


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(img,0,0,canvas.width,canvas.height)

let imageData = ctx.getImageData(0,0,canvas.width,canvas.height)
let data = imageData.data

let copy = new Uint8ClampedArray(data)

let radius = parseInt(blur.value)

for(let y = 0; y < canvas.height; y++){
    for(let x = 0; x < canvas.width; x++){

        let totalR = 0
        let totalG = 0
        let totalB = 0
        let count = 0

        for(let dy = -radius; dy <= radius; dy++){
            for(let dx = -radius; dx <= radius; dx++){

                let nx = x + dx
                let ny = y + dy

                if(nx >= 0 && nx < canvas.width && ny >= 0 && ny < canvas.height){

                    let i = (ny * canvas.width + nx) * 4

                    totalR += copy[i]
                    totalG += copy[i+1]
                    totalB += copy[i+2]
                    count++
                }
            }
        }

        let i = (y * canvas.width + x) * 4

        let r = totalR / count
        let g = totalG / count
        let b = totalB / count

for(let i = 0; i < data.length; i += 4){

    let r = data[i]
    let g = data[i+1]
    let b = data[i+2]

    // TODO: Brightness

    // TODO: Contrast

    // TODO: Saturation

    data[i] = Math.max(0, Math.min(255, r))
    data[i+1] = Math.max(0, Math.min(255, g))
    data[i+2] = Math.max(0, Math.min(255, b))
}

ctx.putImageData(imageData,0,0)
}

// 200,150,200

// gradient.addColorStop(1,"rgba(0,0,0,0.6)")

// ctx.fillStyle = gradient
// ctx.fillRect(0,0,400,300)

// }


draw()

</script>

</body>
</html>
